<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windsurf 注册助手 - 设置</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 600px;
            padding: 40px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .setting-group {
            margin-bottom: 30px;
        }
        
        .setting-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        
        .setting-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .setting-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .setting-group small {
            display: block;
            margin-top: 8px;
            color: #999;
            font-size: 12px;
        }
        
        .hint {
            background: #f0f7ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        
        .hint h3 {
            font-size: 14px;
            color: #667eea;
            margin-bottom: 8px;
        }
        
        .hint p {
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }
        
        .hint code {
            background: #e8f0ff;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
        }
        
        button {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f5f5f5;
            color: #666;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            display: none;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            text-align: center;
            font-size: 12px;
            color: #999;
        }
        
        .footer a {
            color: #667eea;
            text-decoration: none;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚙️ Windsurf 注册助手</h1>
            <p>配置后端服务器地址</p>
        </div>
        
        <div class="hint">
            <h3>💡 提示</h3>
            <p>
                后端服务器用于保存注册的账号信息和获取验证码。<br>
                如果你已经部署了后端，请输入完整的URL地址。<br>
                示例：<code>https://windsurf-auto-register-backend.onrender.com</code>
            </p>
        </div>
        
        <div class="setting-group">
            <label for="backend-url">🌐 后端服务器地址</label>
            <input 
                type="url" 
                id="backend-url" 
                placeholder="https://your-backend.com"
                required
            >
            <small>默认：http://localhost:3000（仅限本地使用）</small>
        </div>
        
        <div class="button-group">
            <button class="btn-secondary" id="reset">重置为默认</button>
            <button class="btn-primary" id="save">保存设置</button>
        </div>
        
        <div id="status" class="status"></div>
        
        <div class="footer">
            <p>
                需要帮助？查看 
                <a href="https://github.com/your-repo" target="_blank">使用文档</a>
            </p>
        </div>
    </div>
    
    <script src="options.js"></script>
</body>
</html>
